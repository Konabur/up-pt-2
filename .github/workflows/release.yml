name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run experiment
        run: uv run main.py

      - name: Process all datasets
        run: bash scripts/process_data.sh

      - name: Create results archive
        run: |
          cd results
          for dataset in */; do
            zip -r "../${dataset%/}.zip" "$dataset"
          done
          cd ..
          zip -r results-all.zip results/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            results/*.png
            results/*.html
            results/*.json
            results/*.npz
            results/*.zip
            results-all.zip
          body: |
            Эксперимент ${{ github.ref_name }}

            Результаты анализа объёма растительного покрова TLS для всех датасетов.

            **Файлы:**
            - `*.png` - графики анализа
            - `*.html` - интерактивная 3D визуализация
            - `results.json` - метрики эксперимента
            - `cloud.npz` - облако точек

            **Архивы:**
            - `results-all.zip` - все датасеты вместе
            - `<dataset>.zip` - отдельный архив для каждого датасета

            Каждый архив содержит: графики (PNG), 3D визуализацию (HTML), метрики (JSON), облако точек (NPZ).
          fail_on_unmatched_files: false
