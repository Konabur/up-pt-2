name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run experiment
        run: uv run main.py

      - name: Create results archive
        run: zip -r results.zip results/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            results/*.png
            results/*.html
            results/*.json
            results/*.npz
            results.zip
          body: |
            Эксперимент ${{ github.ref_name }}

            Результаты анализа объёма растительного покрова TLS.

            **Файлы:**
            - `results.zip` - архив со всеми результатами (графики, 3D визуализация, данные, облако точек)
            - `*.png` - графики анализа
            - `*.html` - интерактивная 3D визуализация
            - `results.json` - метрики эксперимента
            - `cloud.npz` - облако точек
          fail_on_unmatched_files: true
