name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run experiment
        run: uv run main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            results/*.png
            results/*.html
            results/*.json
          body: |
            Эксперимент ${{ github.ref_name }}

            Результаты анализа объёма растительного покрова TLS.
          fail_on_unmatched_files: true
